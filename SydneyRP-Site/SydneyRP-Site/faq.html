<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FAQ</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="assets/logo.svg" type="image/svg+xml" />
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="logo-area">
        <a href="index.html" style="display:flex;align-items:center;gap:12px;text-decoration:none">
          <img src="assets/logo.png" alt="Logo" class="header-logo" onerror="this.src='assets/logo.svg'" />
          <span class="server-name" id="serverNameHeader">Mon Serveur</span>
        </a>
      </div>
      <nav>
        <a href="index.html" class="btn-back">← Retour</a>
        <a href="#" id="navDiscordLink" class="btn-discord" style="display:none" target="_blank" rel="noopener">💬 Discord</a>
      </nav>
    </div>
  </header>

  <section class="hero hero-page hero-yellow" id="faqHero">
    <div class="hero-content">
      <div class="hero-badge hero-badge-yellow">❓ FAQ</div>
      <h1 id="heroTitle">Questions Fréquentes</h1>
      <p id="heroSubtitle">Retrouvez les réponses aux questions les plus posées.</p>
    </div>
  </section>

  <main class="container" id="faqContainer">
    <div class="faq-search-bar">
      <input type="text" id="faqSearch" placeholder="🔍 Rechercher une question..." oninput="filterFaq()" />
    </div>
    <div class="faq-list" id="faqList"></div>
  </main>

  <footer><p id="footerText">© 2026 Mon Serveur — Tous droits réservés</p></footer>

  <script src="data.js"></script>
  <script src="pages.js"></script>
</body>
</html>
